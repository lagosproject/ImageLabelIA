name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # SHA-256 of the trusted convnext.onnx — must match EXPECTED_ONNX_SHA256 in download_model.py
  MODEL_SHA256: "5d36f3ed20cb2a01392149036a2922f0cb7982f2d3e857fef1af66befb678f17"
  # Opt into Node.js 24 now — forced on June 16 2026, removal Sep 16 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: 'macos-13'       # Intel (x86_64) — last Intel GitHub runner
            args: '--target x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'   # glibc 2.39 — required by ORT prebuilt binaries
            args: ''
            rust_targets: ''
          # Windows removed: mingw-w64-x86_64-gexiv2 does not exist in MSYS2.
          # Add back once gexiv2 is available via vcpkg + x86_64-pc-windows-msvc target.

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.rust_targets }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_targets }}-cargo-
            ${{ runner.os }}-cargo-

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Install Dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgexiv2-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Install Dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install gexiv2 pkg-config libffi

      # ── Shared ───────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install download script dependencies
        run: pip install huggingface-hub

      # Run after setup-python: it overwrites PKG_CONFIG_PATH, so we re-set it here.
      # Use `find` to locate gexiv2.pc regardless of where brew puts it.
      - name: Configure macOS PKG_CONFIG_PATH
        if: startsWith(matrix.platform, 'macos')
        run: |
          BREW_PREFIX=$(brew --prefix)
          LIBFFI_PREFIX=$(brew --prefix libffi)
          BREW_STD="${BREW_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/share/pkgconfig:${LIBFFI_PREFIX}/lib/pkgconfig"
          # Locate the actual gexiv2.pc file — don't assume lib/pkgconfig exists or is populated
          GEXIV2_PC=$(find "${BREW_PREFIX}" -name "gexiv2.pc" 2>/dev/null | head -1)
          if [ -z "$GEXIV2_PC" ]; then
            echo "ERROR: gexiv2.pc not found anywhere under ${BREW_PREFIX}" && exit 1
          fi
          GEXIV2_PC_DIR=$(dirname "$GEXIV2_PC")
          BREW_PKGCONFIG="${GEXIV2_PC_DIR}:${BREW_STD}"
          echo "Found gexiv2.pc at: ${GEXIV2_PC}"
          echo "PKG_CONFIG_PATH=${BREW_PKGCONFIG}:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH_aarch64_apple_darwin=${BREW_PKGCONFIG}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH_x86_64_apple_darwin=${BREW_PKGCONFIG}" >> $GITHUB_ENV

      - name: Cache ONNX model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: |
            src-tauri/resources/convnext.onnx
            src-tauri/resources/convnext_labels.json
          key: convnext-onnx-${{ env.MODEL_SHA256 }}

      - name: Download Model Weights for Bundling
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python download_model.py

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Publish Release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Image Label IA v__VERSION__'
          releaseBody: 'Locally run AI-assisted image classification and metadata generator. Download the asset for your operating system below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
