<div class="app-container">
  <!-- Top Header Navigation -->
  <header class="app-header">
    <div class="brand">
      <img src="assets/tauri.svg" class="brand-logo" alt="ImageLabelIA Logo" />
      <div class="brand-info">
        <h1>ImageLabelIA</h1>
      </div>
    </div>

    <div class="folder-search-container">
      <div class="segmented-btn-group">
        <button
          class="scan-btn batch-tag-btn"
          [class.running]="batch.running"
          [style.background]="batch.getProgressGradient()"
          (click)="onBatchTagClick()"
          [disabled]="images.length === 0 && subfolders.length === 0"
          [title]="batch.running ? 'Click to cancel auto-tagging folder' : 'Automatically run AI keyword tagging on all images in folder'"
        >
          <span *ngIf="!batch.running">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; display: inline-block; vertical-align: middle;"><path d="m12 3-1.912 5.886L4.202 9l5.886 1.912L12 16.798l1.912-5.886L19.798 9l-5.886-1.912L12 3Z"/></svg>
            <span style="vertical-align: middle;">Auto-Tag Folder</span>
          </span>
          <span *ngIf="batch.running">
            {{ batch.progressPercent }}% · Cancel
          </span>
        </button>
      </div>
    </div>

    <div class="batch-error-banner" *ngIf="batchError">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      <span>{{ batchError }}</span>
      <button class="banner-close-btn" (click)="batchError = ''">&times;</button>
    </div>
  </header>

  <!-- Main Content Layout -->
  <div class="main-layout">

    <!-- Left Navigation Panel: Folder Tree -->
    <aside class="sidebar" [class.collapsed]="leftSidebarCollapsed">
      <app-folder-tree
        [subfolders]="subfolders"
        (folderSelected)="navigateToFolder($event)"
        (collapse)="toggleLeftSidebar()"
      />
    </aside>

    <!-- Center Pane: Image Gallery -->
    <section class="gallery-container">
      <app-image-gallery
        [images]="images"
        [selectedImage]="selectedImage"
        [scanning]="scanning"
        [scanError]="scanError"
        [leftSidebarCollapsed]="leftSidebarCollapsed"
        [rightSidebarCollapsed]="rightSidebarCollapsed"
        (imageSelected)="selectImage($event)"
        (expandLeft)="toggleLeftSidebar()"
        (expandRight)="toggleRightSidebar()"
      />
    </section>

    <!-- Right Pane: Tagging & Details Panel -->
    <aside class="details-panel" [class.collapsed]="rightSidebarCollapsed">
      <app-image-details
        [selectedImage]="selectedImage"
        (collapse)="toggleRightSidebar()"
      />
    </aside>

  </div>

  <!-- Bottom status bar & breadcrumbs path route navigation -->
  <footer class="app-footer">
    <div class="footer-path-route">
      <button class="nav-btn-mini" (click)="navigateToParent()" title="Go to Parent Folder">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>

      <span class="route-label">Route:</span>
      <button class="breadcrumb-btn root" (click)="navigateToFolder('/')" title="Go to Root">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>

      <ng-container *ngFor="let seg of pathSegments; let last = last">
        <span class="breadcrumb-separator">
          <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
        <button
          class="breadcrumb-btn"
          [class.active]="last"
          (click)="navigateToFolder(seg.fullPath)"
          [title]="seg.fullPath"
        >
          {{ seg.name }}
        </button>
      </ng-container>
    </div>

    <div class="footer-status">
      <button class="browse-btn mini" (click)="browseFolder()" title="Browse folder natively">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span>Browse Folder</span>
      </button>
    </div>
  </footer>
</div>

<!-- Batch Tagging Report Modal -->
<app-batch-report-modal
  [report]="batch.report"
  (dismiss)="closeReport()"
/>

<!-- Batch Tagging Configuration Modal -->
<app-batch-config-modal
  [visible]="showConfigModal"
  [folderPath]="folderPath"
  (run)="startBatchTagging($event)"
  (close)="showConfigModal = false"
/>
